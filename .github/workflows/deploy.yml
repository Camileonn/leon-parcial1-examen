name: Deploy Leon App to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy to Fargate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t leon-app .
          docker tag leon-app:latest 600627353549.dkr.ecr.us-east-1.amazonaws.com/leon-app-repo:latest

      - name: Push Docker image to ECR
        run: |
          docker push 600627353549.dkr.ecr.us-east-1.amazonaws.com/leon-app-repo:latest

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster leon-cluster \
            --service leon-service \
            --force-new-deployment